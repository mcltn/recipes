<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}My Recipes</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍳 <a href="{{ '/' | relative_url }}" class="home-link">My Recipes</a></h1>
            <p class="subtitle">A collection of recipes I love</p>
        </header>

        <nav class="breadcrumb">
            {% if page.url != '/' %}
                <a href="{{ '/' | relative_url }}">← Back to Recipes</a>
            {% endif %}
        </nav>

        <main>
            {{ content }}
        </main>

        <footer>
            <p>Made with ❤️ | <a href="https://github.com" target="_blank">GitHub</a></p>
        </footer>
    </div>
</body>
</html>
